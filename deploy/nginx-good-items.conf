server {
    listen 80;
    server_name zanzanai.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zanzanai.top;

    ssl_certificate /etc/nginx/ssl/zanzanai.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/zanzanai.top/privkey.pem;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/zanzanai_access.log;
    error_log /var/log/nginx/zanzanai_error.log warn;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
    }

    location / {
        root /var/www/good-items-admin;
        try_files $uri $uri/ /index.html;
    }
}
