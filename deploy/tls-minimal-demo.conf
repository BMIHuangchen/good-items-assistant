server {
    listen 80;
    server_name zanzanai.top;

    location = /tls-ping {
        default_type application/json;
        return 200 '{"ok":true,"protocol":"http","source":"nginx-minimal-demo"}';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name zanzanai.top;

    ssl_certificate /etc/nginx/ssl/zanzanai.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/zanzanai.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 10m;

    location = /tls-ping {
        default_type application/json;
        add_header X-Minimal-Demo nginx-only always;
        return 200 '{"ok":true,"protocol":"https","source":"nginx-minimal-demo"}';
    }
}
